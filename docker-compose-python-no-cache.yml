version: '3'

services:
  api:
    image: linkextractor-api:python-nocache
    build: ./api-python
    ports:
      - "5000:5000"
    environment:
      - USE_CACHE=false
    volumes:
      - ./logs:/app/logs
  web:
    image: linkextractor-web:step6-php
    build: ./www
    ports:
      - "80:80"
    environment:
      - API_ENDPOINT=http://api:5000/api/
