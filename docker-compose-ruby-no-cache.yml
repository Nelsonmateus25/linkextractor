version: '3'

services:
  api:
    image: linkextractor-api:ruby-nocache
    build: ./api
    ports:
      - "4567:4567"
    environment:
      - USE_CACHE=false
    volumes:
      - ./logs:/app/logs
  web:
    image: linkextractor-web:step6-php
    build: ./www
    ports:
      - "80:80"
    environment:
      - API_ENDPOINT=http://api:4567/api/
